name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC daily
  workflow_dispatch:       # allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump v17
        run: |
          sudo apt-get install -y curl gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -y
          sudo apt-get install -y --allow-downgrades postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Run backup
        run: |
          DATE=$(date +%Y-%m-%d)
          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --no-owner \
            --no-acl \
            --schema=public \
            --no-password \
            -f backup_${DATE}.sql
          echo "Backup size: $(wc -c < backup_${DATE}.sql) bytes"
          echo "Tables backed up:"
          grep "^CREATE TABLE" backup_${DATE}.sql | head -20

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: backup_*.sql
          retention-days: 30
