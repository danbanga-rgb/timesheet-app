name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC daily
  workflow_dispatch:       # allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump
        run: sudo apt-get install -y postgresql-client

      - name: Run backup
        run: |
          DATE=$(date +%Y-%m-%d)
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --no-owner \
            --no-acl \
            --schema=public \
            --no-password \
            -f backup_${DATE}.sql
          echo "Backup size: $(wc -c < backup_${DATE}.sql) bytes"
          echo "Tables backed up:"
          grep "^CREATE TABLE" backup_${DATE}.sql | head -20

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: backup_*.sql
          retention-days: 30
