name: Monthly Invoice Parser Review

on:
  schedule:
    # 9am UTC on the 8th of every month — all invoices are in by then
    - cron: '0 9 8 * *'
  workflow_dispatch:
    inputs:
      month_override:
        description: 'Optional: force a specific month (YYYY-MM), defaults to previous calendar month'
        required: false

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run analysis
        env:
          SUPABASE_URL:              https://mimlatvdwxqtgxrgcins.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BREVO_API_KEY:             ${{ secrets.BREVO_API_KEY }}
          REPORT_TO_EMAIL:           danbanga@gmail.com
          FROM_EMAIL:                timesheets@mysynergie.net
          FROM_NAME:                 Synergie Timesheet System
          MONTH_OVERRIDE:            ${{ github.event.inputs.month_override }}
        run: node scripts/monthly-invoice-analysis.js
